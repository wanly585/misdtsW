<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">    
    <title>Vault Personal</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

    <script type="module" src="main.js"></script>


    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Vault Personal</h1>

<div class="left-column">
  <form id="vaultForm">
      <label for="titulo">Título:</label>
      <input type="text" id="titulo" required>

      <label for="usuario">Usuario/Correo:</label>
      <input type="text" id="usuario" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" required>

      <label for="nota">Nota (opcional):</label>
      <textarea id="nota"></textarea>

      <button type="submit">Guardar</button>
  </form>

  <!-- Generador debajo del formulario -->
  <section class="password-generator-section">
      <div class="gen-field">
          <label class="gen-label">Base de seguridad</label>
          <div class="gen-input-wrapper">
              <input type="text" id="passBase" class="gen-input" placeholder="Escribe tu palabra...">
              <div id="strengthIndicator" class="gen-strength-dot"></div>
          </div>
      </div>

      <button id="genAction" class="gen-button">GENERAR VARIANTES SEGURAS</button>

      <div id="passResults" class="gen-results">
          <!-- Variantes aparecerán aquí -->
      </div>
  </section>
</div>

<section class="datos-section">
    <input type="text" id="searchInput" placeholder="Buscar por título...">
    <h2 class="datos-titulo">Datos guardados</h2>
    <ul id="vaultList"></ul>
</section>









<!-- Pantalla de bloqueo -->
<div id="lockScreen">
  <div class="lock-card">
    <h2>PONER CLAVE</h2>
    <input type="password" id="accessKey" placeholder="Ingresa la clave">
    <button id="unlockBtn">Entrar</button>
    <p id="errorMsg" style="color:red; display:none;">Clave incorrecta</p>
  </div>
</div>

<!-- Contenido principal oculto hasta desbloquear -->
<div id="mainContent" style="display:none;">
  <!-- Aquí va tu formulario, generador y datos -->
</div>



<script type="module" src="main.js"></script>
</body>
</html>
